# Spark ETL Job - Chạy trong hasu-ml namespace
# Kết nối đến Spark Master qua DNS: spark-master:7077
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-etl-hybrid
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-spark
        image: busybox:1.36
        resources:
          limits:
            cpu: "100m"
            memory: "64Mi"
          requests:
            cpu: "50m"
            memory: "32Mi"
        command: ['sh', '-c', 'until nc -z spark-master 7077; do echo "Waiting for Spark..."; sleep 5; done']
      - name: wait-for-db
        image: busybox:1.36
        resources:
          limits:
            cpu: "100m"
            memory: "64Mi"
          requests:
            cpu: "50m"
            memory: "32Mi"
        command: ['sh', '-c', 'until nc -z postgres 5432 && nc -z clickhouse 9000; do echo "Waiting for DBs..."; sleep 2; done']
      containers:
      - name: spark-etl
        image: apache/spark:3.5.0
        env:
        - name: SPARK_MASTER
          value: "spark://spark-master:7077"
        - name: SPARK_APP_NAME
          value: "CSV_ETL_Hybrid"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_DB
          value: "retail_db"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: POSTGRES_PASSWORD
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_DB
          value: "default"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: CLICKHOUSE_PASSWORD
        - name: SPARK_LOCAL_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        - name: csv-output
          mountPath: /csv_output
        # Sử dụng shell script để expand env vars và cấu hình driver IP đúng
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting Spark ETL..."
          echo "Driver IP: $SPARK_LOCAL_IP"
          exec /opt/spark/bin/spark-submit \
            --master "$SPARK_MASTER" \
            --name "$SPARK_APP_NAME" \
            --conf "spark.driver.bindAddress=0.0.0.0" \
            --conf "spark.driver.host=$SPARK_LOCAL_IP" \
            --conf "spark.driver.port=4040" \
            --conf "spark.executor.memory=512m" \
            --conf "spark.executor.cores=1" \
            --conf "spark.python.worker.memory=256m" \
            /opt/spark/examples/src/main/python/pi.py
        # TODO: Thay /opt/spark/examples/src/main/python/pi.py bằng ETL script thực tế
        # Ví dụ:
        # - /csv_input/etl_script.py (mount từ PVC)
        # - Hoặc tạo ConfigMap với ETL script
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
      - name: csv-output
        persistentVolumeClaim:
          claimName: csv-output-pvc
