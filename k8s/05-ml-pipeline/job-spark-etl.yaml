apiVersion: batch/v1
kind: Job
metadata:
  name: spark-etl-hybrid
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      # Wait for Spark cluster
      - name: wait-for-spark
        image: busybox:1.36
        command: 
          - 'sh'
          - '-c'
          - |
            until nc -z spark-master.spark 7077; do
              echo "Waiting for Spark master..."
              sleep 5
            done
            echo "Spark master is ready"
      # Wait for databases
      - name: wait-for-db
        image: busybox:1.36
        command:
          - 'sh'
          - '-c'
          - |
            until nc -z postgres 5432 && nc -z clickhouse 9000; do
              echo "Waiting for databases..."
              sleep 2
            done
            echo "Databases are ready"
      containers:
      - name: spark-etl
        image: ${DOCKERHUB_USERNAME}/hasu-spark-etl:latest
        imagePullPolicy: Always
        env:
        - name: SPARK_MASTER
          value: "spark://spark-master.spark:7077"
        - name: INPUT_PATH
          value: "/csv_input"
        - name: OUTPUT_PATH
          value: "/shared/processed"
        - name: MODE
          value: "full"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "retail_db"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: POSTGRES_PASSWORD
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_PORT
          value: "9000"
        - name: CLICKHOUSE_DB
          value: "retail_dw"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hasu-ml-secrets
              key: CLICKHOUSE_PASSWORD
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        - name: spark-shared
          mountPath: /shared
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
      - name: spark-shared
        persistentVolumeClaim:
          claimName: spark-shared-pvc
          namespace: spark
---
# Alternative: Run only Spark phase
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-only
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-spark
        image: busybox:1.36
        command: 
          - 'sh'
          - '-c'
          - |
            until nc -z spark-master.spark 7077; do
              echo "Waiting for Spark master..."
              sleep 5
            done
      containers:
      - name: spark-etl
        image: ${DOCKERHUB_USERNAME}/hasu-spark-etl:latest
        imagePullPolicy: Always
        env:
        - name: SPARK_MASTER
          value: "spark://spark-master.spark:7077"
        - name: MODE
          value: "spark-only"
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        - name: spark-shared
          mountPath: /shared
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
      - name: spark-shared
        persistentVolumeClaim:
          claimName: spark-shared-pvc
          namespace: spark
