# ⚠️ DEPRECATED: Replaced by job-spark-etl.yaml
# This job is kept for backward compatibility only
# Please use: kubectl apply -f job-spark-etl.yaml
# For better performance, use Spark Hybrid ETL: make k3s-spark
apiVersion: batch/v1
kind: Job
metadata:
  name: csv-process
  namespace: hasu-ml
  annotations:
    deprecated: "true"
    replacement: "job-spark-etl.yaml"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres...; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis...; sleep 2; done;']
      containers:
      - name: csv-processor
        image: ${DOCKERHUB_USERNAME}/hasu-sync-tool:latest
        imagePullPolicy: Always
        command: ["python", "auto_process_files.py", "--input", "/csv_input", "--output", "/csv_output"]
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        - name: csv-output
          mountPath: /csv_output
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
      - name: csv-output
        persistentVolumeClaim:
          claimName: csv-output-pvc
