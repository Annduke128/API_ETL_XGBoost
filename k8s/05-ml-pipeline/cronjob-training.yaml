# ML Training CronJob - Chạy training mô hình định kỳ trên K3s

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-training-weekly
  namespace: ml-pipeline
spec:
  schedule: "0 2 * * 0"  # 2 AM mỗi Chủ nhật
  concurrencyPolicy: Forbid
  suspend: false
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ml-training
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ml-training
              image: retail-ml-pipeline:latest
              imagePullPolicy: IfNotPresent
              command:
                - python
                - /app/xgboost_forecast.py
                - --mode
                - train
                - --trials
                - "50"
              envFrom:
                - configMapRef:
                    name: retail-config
                - secretRef:
                    name: retail-secrets
              resources:
                requests:
                  memory: "4Gi"
                  cpu: "2"
                limits:
                  memory: "12Gi"
                  cpu: "4"
              volumeMounts:
                - name: models
                  mountPath: /app/models
                - name: training-tmp
                  mountPath: /tmp
              # Health check
              livenessProbe:
                exec:
                  command:
                    - python
                    - -c
                    - "import os; print('alive')"
                initialDelaySeconds: 60
                periodSeconds: 300
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: ml-models-pvc
            - name: training-tmp
              emptyDir:
                sizeLimit: 10Gi
          # Node affinity - ưu tiên node có nhiều resource
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 1
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/master
                        operator: DoesNotExist
          # Tolerations nếu cần chạy trên master
          tolerations:
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
