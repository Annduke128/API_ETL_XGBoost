apiVersion: batch/v1
kind: Job
metadata:
  name: import-sales
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        resources:
          limits:
            cpu: "100m"
            memory: "64Mi"
          requests:
            cpu: "50m"
            memory: "32Mi"
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
      - name: sales-importer
        image: annduke/hasu-sync-tool:latest
        imagePullPolicy: Always
        command: ["sh", "-c", "python import_sales.py /csv_input/BaoCaoBanHang_*.xlsx || python import_sales.py /csv_input/BaoCaoBanHang.xlsx || ls /csv_input/"]
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
