apiVersion: batch/v1
kind: Job
metadata:
  name: import-inventory
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres...; sleep 2; done;']
      containers:
      - name: inventory-importer
        image: ${DOCKERHUB_USERNAME}/hasu-sync-tool:latest
        imagePullPolicy: Always
        command: ["python", "import_inventory.py"]
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        volumeMounts:
        - name: csv-input
          mountPath: /csv_input
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: csv-input
        persistentVolumeClaim:
          claimName: csv-input-pvc
