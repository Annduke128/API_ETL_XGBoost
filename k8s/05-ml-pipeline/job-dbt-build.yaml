apiVersion: batch/v1
kind: Job
metadata:
  name: dbt-build
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: dbt
        image: annduke/hasu-dbt:latest
        imagePullPolicy: Always
        workingDir: /usr/app/dbt
        command: ["sh", "-c"]
        args:
        - |
          # Setup profiles
          mkdir -p /root/.dbt
          cp profiles.yml /root/.dbt/
          
          # Clean and build
          dbt clean
          dbt build --profiles-dir /root/.dbt --exclude package:dbt_utils
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        volumeMounts:
        - name: dbt-home
          mountPath: /root/.dbt
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: dbt-home
        emptyDir: {}
