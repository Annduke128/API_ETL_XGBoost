apiVersion: batch/v1
kind: Job
metadata:
  name: sync-data
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: ${DOCKERHUB_USERNAME}/hasu-sync-tool:latest
        imagePullPolicy: Always
        command: ["python", "sync_to_clickhouse.py"]
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
