apiVersion: batch/v1
kind: Job
metadata:
  name: ml-train-gpu
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-gpu
      hostNetwork: true
      containers:
      - name: ml-train
        image: ${DOCKERHUB_USERNAME}/hasu-ml-pipeline:gpu-latest
        imagePullPolicy: IfNotPresent
        command: ["python", "train_models.py"]
        env:
        - name: USE_GPU
          value: "true"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: MODEL_DIR
          value: "/app/models"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "retail_db"
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
        # Mount NVIDIA drivers từ host
        - name: nvidia-driver
          mountPath: /usr/local/nvidia
          readOnly: true
        - name: dev-nvidia0
          mountPath: /dev/nvidia0
        - name: dev-nvidiactl
          mountPath: /dev/nvidiactl
        - name: dev-nvidia-modeset
          mountPath: /dev/nvidia-modeset
        - name: dev-nvidia-uvm
          mountPath: /dev/nvidia-uvm
        - name: dev-nvidia-uvm-tools
          mountPath: /dev/nvidia-uvm-tools
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models
      - name: nvidia-driver
        hostPath:
          path: /usr/lib/nvidia
      - name: dev-nvidia0
        hostPath:
          path: /dev/nvidia0
      - name: dev-nvidiactl
        hostPath:
          path: /dev/nvidiactl
      - name: dev-nvidia-modeset
        hostPath:
          path: /dev/nvidia-modeset
      - name: dev-nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
      - name: dev-nvidia-uvm-tools
        hostPath:
          path: /dev/nvidia-uvm-tools
