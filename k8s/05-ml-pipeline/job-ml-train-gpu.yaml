apiVersion: batch/v1
kind: Job
metadata:
  name: ml-train-gpu
  namespace: hasu-ml
spec:
  template:
    spec:
      restartPolicy: OnFailure
      runtimeClassName: nvidia          # Sử dụng NVIDIA runtime
      nodeSelector:
        nvidia.com/gpu.present: "true"  # Chọn node có GPU
      containers:
      - name: ml-train
        image: annduke/hasu-ml-pipeline:gpu-stable-v6
        imagePullPolicy: Always
        command: ["python", "train_models.py"]
        args: ["--trials", "50"]
        env:
        - name: USE_GPU
          value: "true"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: MODEL_DIR
          value: "/app/models"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "retail_db"
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: 1              # Request 1 GPU
          limits:
            memory: "16Gi"
            cpu: "4"
            nvidia.com/gpu: 1              # Limit 1 GPU
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: ml-models-gpu
