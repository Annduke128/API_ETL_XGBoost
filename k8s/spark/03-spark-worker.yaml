apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
      - name: spark-worker
        image: bitnami/spark:3.5.0
        env:
        - name: SPARK_MODE
          value: worker
        - name: SPARK_MASTER_URL
          value: spark://spark-master:7077
        - name: SPARK_WORKER_MEMORY
          value: "6g"
        - name: SPARK_WORKER_CORES
          value: "3"
        - name: SPARK_WORKER_PORT
          value: "8888"
        - name: SPARK_WORKER_WEBUI_PORT
          value: "8081"
        ports:
        - containerPort: 8888
        - containerPort: 8081
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: spark-checkpoint
          mountPath: /tmp/checkpoint
        - name: spark-shared
          mountPath: /shared
      volumes:
      - name: spark-checkpoint
        persistentVolumeClaim:
          claimName: spark-checkpoint-pvc
      - name: spark-shared
        persistentVolumeClaim:
          claimName: spark-shared-pvc
