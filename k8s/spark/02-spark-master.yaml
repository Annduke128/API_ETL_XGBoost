apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
      - name: spark-master
        image: bitnami/spark:3.5
        env:
        - name: SPARK_MODE
          value: master
        - name: SPARK_MASTER_PORT
          value: "7077"
        - name: SPARK_MASTER_WEBUI_PORT
          value: "8080"
        - name: SPARK_MASTER_LOG
          value: "/var/log/spark"
        ports:
        - containerPort: 7077
          name: spark
        - containerPort: 8080
          name: webui
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: spark-checkpoint
          mountPath: /tmp/checkpoint
        - name: spark-shared
          mountPath: /shared
      volumes:
      - name: spark-checkpoint
        persistentVolumeClaim:
          claimName: spark-checkpoint-pvc
      - name: spark-shared
        persistentVolumeClaim:
          claimName: spark-shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: spark
spec:
  selector:
    app: spark-master
  ports:
  - name: spark
    port: 7077
    targetPort: 7077
  - name: webui
    port: 8080
    targetPort: 8080
  type: ClusterIP
