apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hasu-ml
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: hasu-ml
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: hasu-ml
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: hasu-ml
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
