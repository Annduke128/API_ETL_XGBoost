# Template secrets - Copy to secrets.yaml and fill in values
# Then apply: kubectl apply -f k8s/02-config/secrets.yaml
# DO NOT commit secrets.yaml to git!
apiVersion: v1
kind: Secret
metadata:
  name: hasu-ml-secrets
  namespace: hasu-ml
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_PASSWORD: "CHANGE_ME"
  
  # ClickHouse
  CLICKHOUSE_PASSWORD: "CHANGE_ME"
  
  # Redis
  REDIS_PASSWORD: "CHANGE_ME"
  
  # Airflow
  AIRFLOW__CORE__FERNET_KEY: "CHANGE_ME"  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  
  # Superset
  SUPERSET_SECRET_KEY: "CHANGE_ME"
  
  # Email
  EMAIL_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-credentials
  namespace: hasu-ml
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "https://index.docker.io/v1/": {
          "username": "YOUR_DOCKERHUB_USERNAME",
          "password": "YOUR_DOCKERHUB_TOKEN",
          "email": "your-email@example.com",
          "auth": "BASE64_ENCODED_USERNAME:PASSWORD"
        }
      }
    }
