apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-config
  namespace: retail-data
data:
  # PostgreSQL
  POSTGRES_HOST: "retail-postgres-rw.database.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "retail_db"
  
  # ClickHouse
  CLICKHOUSE_HOST: "retail-clickhouse.database.svc.cluster.local"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DB: "retail_dw"
  CLICKHOUSE_USER: "default"
  
  # Redis
  REDIS_HOST: "redis-master.retail-data.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Application
  LOG_LEVEL: "INFO"
  MODEL_DIR: "/app/models"
  PYTHONUNBUFFERED: "1"
---
