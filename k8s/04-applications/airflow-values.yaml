# Helm values cho Apache Airflow trên K3s
# Cài đặt: helm install airflow apache-airflow/airflow -n retail-data -f airflow-values.yaml

# Executor
executor: "CeleryExecutor"

# External database (PostgreSQL HA)
postgresql:
  enabled: false

externalDatabase:
  type: postgres
  host: retail-postgres-rw.database.svc.cluster.local
  port: 5432
  database: airflow_db
  user: airflow
  password: airflow_password

# External Redis
redis:
  enabled: false

data:
  metadataSecretName: ~
  resultBackendSecretName: ~
  brokerUrlSecretName: ~

# Celery configuration
celery:
  worker:
    replicas: 1
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"

# Webserver
webserver:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
  service:
    type: ClusterIP

# Scheduler
scheduler:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

# Triggerer
triggerer:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# DAGs
dags:
  persistence:
    enabled: true
    storageClassName: longhorn-fast
    size: 5Gi
    accessMode: ReadWriteMany
  gitSync:
    enabled: false

# Logs
logs:
  persistence:
    enabled: true
    storageClassName: longhorn-fast
    size: 10Gi

# Config
defaultAirflowRepository: apache/airflow
config:
  core:
    default_timezone: Asia/Ho_Chi_Minh
    load_examples: False
  webserver:
    expose_config: True
  celery:
    worker_concurrency: 4
