apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: hasu-ml
  labels:
    app: superset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      initContainers:
      - name: superset-init
        image: apache/superset:3.0.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          superset db upgrade && \
          superset init && \
          superset fab create-admin \
            --username admin \
            --firstname Admin \
            --lastname User \
            --email admin@hasu.com \
            --password admin || true
        env:
        # Security
        - name: SUPERSET_SECRET_KEY
          value: "2L2Yc5wTf9pLmN3QxR7vKaJ4HbGdEfUjCiSn8mAkPlYsWqX1Zo"
        # Database connection cho init
        - name: DATABASE_HOST
          value: "superset-db"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_USER
          value: "superset"
        - name: DATABASE_PASSWORD
          value: "superset"
        - name: DATABASE_DB
          value: "superset"
        - name: SQLALCHEMY_DATABASE_URI
          value: "postgresql://superset:superset@superset-db:5432/superset"
        - name: SUPERSET_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      containers:
      - name: superset
        image: apache/superset:3.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8088
        envFrom:
        - configMapRef:
            name: hasu-ml-config
        - secretRef:
            name: hasu-ml-secrets
        env:
        - name: SUPERSET_SECRET_KEY
          value: "2L2Yc5wTf9pLmN3QxR7vKaJ4HbGdEfUjCiSn8mAkPlYsWqX1Zo"
        - name: SUPERSET_ENV
          value: "production"
        - name: SUPERSET_PORT
          value: "8088"
        # Database connection (trực tiếp vì envFrom không hoạt động đúng)
        - name: DATABASE_HOST
          value: "superset-db"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_USER
          value: "superset"
        - name: DATABASE_PASSWORD
          value: "superset"
        - name: DATABASE_DB
          value: "superset"
        - name: SQLALCHEMY_DATABASE_URI
          value: "postgresql://superset:superset@superset-db:5432/superset"
        # Redis
        - name: REDIS_HOST
          value: "superset-cache"
        - name: REDIS_PORT
          value: "6379"
        - name: CACHE_REDIS_URL
          value: "redis://superset-cache:6379/1"
        # Override các biến tự động từ K8s service
        - name: SUPERSET_SERVICE_PORT
          value: "8088"
        - name: CLICKHOUSE_HOST
          value: "clickhouse.hasu-ml.svc.cluster.local"
        - name: CLICKHOUSE_PORT
          value: "9000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: superset
  namespace: hasu-ml
spec:
  selector:
    app: superset
  ports:
  - port: 8088
    targetPort: 8088
    nodePort: 30088
  type: NodePort
