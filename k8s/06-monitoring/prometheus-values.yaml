# Helm values cho Prometheus Stack trên K3s
# Cài đặt: helm install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f prometheus-values.yaml

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "50GB"
    
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-fast
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi
    
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "1"
    
    # Service discovery cho custom namespaces
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  config:
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alert@example.com'
    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: 'default-receiver'
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-fast
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  adminPassword: admin123
  persistence:
    enabled: true
    storageClassName: longhorn-fast
    size: 10Gi
  
  # Datasource configuration
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-kube-prometheus-prometheus.monitoring:9090
          access: proxy
          isDefault: true
        - name: ClickHouse
          type: grafana-clickhouse-datasource
          url: http://retail-clickhouse.database:8123
          jsonData:
            defaultDatabase: retail_dw
            port: 8123
            protocol: http

# Disable các exporters không cần thiết
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
