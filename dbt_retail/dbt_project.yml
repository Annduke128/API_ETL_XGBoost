name: 'retail_analytics'
version: '1.0.0'
config-version: 2

profile: 'retail_profile'

dispatch:
  - macro_namespace: dbt
    search_order: ['dbt', 'retail_analytics']

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Query comments để theo dõi
query-comment:
  comment: '{{ dbt_version }} - {{ model_name }} - {{ invocation_id }}'

vars:
  # Biến cho ngành bán lẻ
  min_date: '2020-01-01'
  currency: 'VND'
  
  # Ngưỡng phân loại
  high_value_threshold: 1000000  # 1 triệu VND
  
  # Phân loại ABC
  abc_a_threshold: 0.8  # Top 80% doanh thu
  abc_b_threshold: 0.95  # 80-95% doanh thu
  
  # Phân loại RFM
  rfm_recency_high: 7
  rfm_recency_medium: 30
  rfm_frequency_high: 10
  rfm_monetary_high: 5000000

models:
  retail_analytics:
    # ClickHouse materialization defaults
    +materialized: table
    +engine: 'MergeTree()'
    
    # Cấu hình mặc định cho tất cả models
    # +grants:
    #   select: ['readonly']  # Comment out - role 'readonly' chưa tạo trong ClickHouse
    
    staging:
      +materialized: view
      +tags: ['staging', 'daily']
      # Staging không cần partition vì là view
      
    intermediate:
      +materialized: view
      +tags: ['intermediate']
      
    marts:
      +materialized: table
      +tags: ['marts', 'daily']
      # Marts tables có partition và order by phù hợp
      
      core:
        +tags: ['core']
        # Dimension tables - replicate để join nhanh
        +engine: 'ReplacingMergeTree()'
        
      sales:
        +tags: ['sales']
        # Fact tables - config trong từng model
        
      inventory:
        +tags: ['inventory']
        
      customers:
        +tags: ['customers']

# Seeds configuration
seeds:
  retail_analytics:
    +tags: ['reference']
    +materialized: seed
    
    product:
      +column_types:
        ma_hang: varchar(50)
        ma_vach: varchar(100)
        ten_hang: varchar(500)
        thuong_hieu: varchar(200)
        nhom_hang_cap_1: varchar(200)
        nhom_hang_cap_2: varchar(200)
        nhom_hang_cap_3: varchar(200)
        gia_von_mac_dinh: numeric(15,2)
        gia_ban_mac_dinh: numeric(15,2)
    
    store_types:
      +column_types:
        type_code: varchar(10)
    
    seasonality_factors:
      +column_types:
        month: Int8
        season: varchar(20)
        peak_reason: varchar(50)
        type_code_2: varchar(5)
        type_name_vn: varchar(100)
        type_name_en: varchar(100)
        description: varchar(500)
        typical_area_m2: varchar(20)
        target_customer: varchar(100)


# Tests configuration
tests:
  retail_analytics:
    +severity: warn  # Mặc định warn thay vì error
    +store_failures: true
