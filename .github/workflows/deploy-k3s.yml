name: Deploy to K3s

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  KUBECONFIG: ${{ github.workspace }}/kubeconfig

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $KUBECONFIG
          chmod 600 $KUBECONFIG

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Update image tags
        run: |
          # Update image tags in k8s manifests
          DOCKERHUB_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          
          # Update ML Pipeline CronJobs
          kubectl set image cronjob/ml-training ml-training=$DOCKERHUB_USER/hasu-ml-pipeline:latest -n hasu-ml
          kubectl set image cronjob/ml-predict ml-predict=$DOCKERHUB_USER/hasu-ml-pipeline:latest -n hasu-ml
          kubectl set image cronjob/dbt-daily dbt=$DOCKERHUB_USER/hasu-dbt:latest -n hasu-ml
          
          # Restart deployments to pull new images
          kubectl rollout restart deployment/airflow-webserver -n hasu-ml || true
          kubectl rollout restart deployment/airflow-scheduler -n hasu-ml || true
          kubectl rollout restart deployment/superset -n hasu-ml || true

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/airflow-webserver -n hasu-ml --timeout=300s || true
          kubectl rollout status deployment/airflow-scheduler -n hasu-ml --timeout=300s || true
          kubectl rollout status deployment/superset -n hasu-ml --timeout=300s || true

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n hasu-ml
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n hasu-ml
          echo ""
          echo "=== CronJob Status ==="
          kubectl get cronjobs -n hasu-ml

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} == "success" ]; then
            echo "✅ Deployment to K3s successful!"
          else
            echo "❌ Deployment to K3s failed!"
          fi

      - name: Cleanup
        if: always()
        run: rm -f $KUBECONFIG
