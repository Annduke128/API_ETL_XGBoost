name: Deploy to K3s Production (SSH)

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.K3S_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to K3s Production
        env:
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "🚀 Deploying to K3s Production Server: $K3S_HOST"
          
          # SSH vào máy production và chạy các lệnh deploy
          ssh $K3S_USER@$K3S_HOST << 'EOF'
            set -e
            
            echo "=== K3s Deployment Starting ==="
            
            # Pull latest images trước khi update
            echo "📥 Pulling latest images..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-dbt:latest
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-sync-tool:latest
            
            # Update CronJobs với image mới
            echo "🔄 Updating CronJobs..."
            kubectl set image cronjob/ml-training ml-training=${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest -n hasu-ml
            kubectl set image cronjob/ml-predict ml-predict=${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest -n hasu-ml
            kubectl set image cronjob/dbt-daily dbt=${{ secrets.DOCKERHUB_USERNAME }}/hasu-dbt:latest -n hasu-ml
            
            # Restart Deployments để pull image mới
            echo "🔄 Restarting Deployments..."
            kubectl rollout restart deployment/airflow-webserver -n hasu-ml || true
            kubectl rollout restart deployment/airflow-scheduler -n hasu-ml || true
            kubectl rollout restart deployment/superset -n hasu-ml || true
            kubectl rollout restart deployment/postgres -n hasu-ml || true
            kubectl rollout restart deployment/clickhouse -n hasu-ml || true
            kubectl rollout restart deployment/redis -n hasu-ml || true
            
            # Đợi rollout hoàn thành
            echo "⏳ Waiting for rollouts..."
            kubectl rollout status deployment/airflow-webserver -n hasu-ml --timeout=300s || true
            kubectl rollout status deployment/airflow-scheduler -n hasu-ml --timeout=300s || true
            kubectl rollout status deployment/superset -n hasu-ml --timeout=300s || true
            
            # Verify status
            echo ""
            echo "=== Deployment Status ==="
            kubectl get deployments -n hasu-ml
            echo ""
            echo "=== Pod Status ==="
            kubectl get pods -n hasu-ml
            echo ""
            echo "=== CronJob Status ==="
            kubectl get cronjobs -n hasu-ml
            
            # Cleanup old images để tiết kiệm disk
            echo "🧹 Cleaning up old images..."
            sudo docker image prune -f --filter "until=168h" || true
            
            echo ""
            echo "✅ Deployment completed successfully!"
          EOF

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Successfully deployed to K3s Production!"
          echo "Server: ${{ secrets.K3S_HOST }}"
          echo "Images:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/hasu-dbt:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/hasu-sync-tool:latest"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Failed to deploy to K3s Production!"
          echo "Please check the logs above for details."
          exit 1
