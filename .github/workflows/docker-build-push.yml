name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: hasu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: sync-tool
            context: ./data_cleaning
            dockerfile: ./data_cleaning/Dockerfile
          - name: ml-pipeline
            context: ./ml_pipeline
            dockerfile: ./ml_pipeline/Dockerfile
          - name: dbt
            context: ./dbt_retail
            dockerfile: ./dbt_retail/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Spark ETL build - separate job
  build-spark-etl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Spark ETL
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-spark-etl
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Spark ETL image
        uses: docker/build-push-action@v5
        with:
          context: ./spark-etl
          file: ./spark-etl/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  notify:
    needs: [build-and-push, build-spark-etl]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify success
        if: needs.build-and-push.result == 'success' && needs.build-spark-etl.result == 'success'
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "Images:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-sync-tool:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-ml-pipeline:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-dbt:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-spark-etl:latest"

      - name: Notify failure
        if: needs.build-and-push.result == 'failure' || needs.build-spark-etl.result == 'failure'
        run: |
          echo "❌ Docker build failed!"
          exit 1
