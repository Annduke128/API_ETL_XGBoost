name: Deploy to K3s Production (Self-Hosted)

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify K3s Connection
        run: |
          echo "🔍 Verifying K3s connection..."
          sudo k3s kubectl cluster-info
          sudo k3s kubectl get nodes

      - name: Setup Infrastructure (First Time)
        run: |
          echo "📁 Checking namespace..."
          sudo k3s kubectl get namespace hasu-ml || sudo k3s kubectl create namespace hasu-ml
          echo "✅ Namespace hasu-ml ready"
          
          # Kiểm tra nếu cần apply lần đầu
          echo "🔍 Checking if this is first deployment..."
          if ! sudo k3s kubectl get deployment postgres -n hasu-ml &>/dev/null; then
            echo "🚀 First deployment detected! Applying all manifests..."
            
            # Apply tất cả manifests theo thứ tự
            echo "📦 Applying namespace and network policies..."
            sudo k3s kubectl apply -f k8s/00-namespace/
            
            echo "💾 Applying storage..."
            sudo k3s kubectl apply -f k8s/01-storage/
            
            echo "⚙️ Applying configmaps..."
            sudo k3s kubectl apply -f k8s/02-config/configmap.yaml
            
            echo "🗄️ Applying databases..."
            sudo k3s kubectl apply -f k8s/03-databases/
            
            echo "🌐 Applying applications (Airflow, Superset)..."
            sudo k3s kubectl apply -f k8s/04-applications/
            
            echo "🤖 Applying ML pipeline..."
            sudo k3s kubectl apply -f k8s/05-ml-pipeline/
            
            echo "🔐 Creating secrets from environment variables..."
            sudo k3s kubectl create secret generic hasu-ml-secrets -n hasu-ml \
              --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD || 'postgres' }}" \
              --from-literal=CLICKHOUSE_PASSWORD="${{ secrets.CLICKHOUSE_PASSWORD || 'clickhouse' }}" \
              --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD || '' }}" \
              --from-literal=AIRFLOW__CORE__FERNET_KEY="${{ secrets.AIRFLOW_FERNET_KEY || '' }}" \
              --from-literal=SUPERSET_SECRET_KEY="${{ secrets.SUPERSET_SECRET_KEY || '' }}" \
              --from-literal=EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD || '' }}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            
            echo "⏳ Waiting for databases to be ready (this may take a few minutes)..."
            sleep 10
            sudo k3s kubectl get pods -n hasu-ml
            
            echo "✅ Infrastructure setup complete!"
            echo "⚠️ Note: Pods may still be starting up. Check status with: sudo k3s kubectl get pods -n hasu-ml"
          else
            echo "✅ Infrastructure already exists, skipping initial setup..."
          fi

      - name: Deploy to K3s (Local)
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "🚀 Deploying to K3s (Self-Hosted Runner)"
          
          # Kiểm tra quyền
          echo "🔍 Current user:"
          whoami
          
          # Pull latest images
          echo "📥 Pulling latest images..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-dbt:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hasu-sync-tool:latest
          
          # Update CronJobs
          echo "🔄 Updating CronJobs..."
          sudo k3s kubectl set image cronjob/ml-training ml-training=${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest -n hasu-ml
          sudo k3s kubectl set image cronjob/ml-predict ml-predict=${{ secrets.DOCKERHUB_USERNAME }}/hasu-ml-pipeline:latest -n hasu-ml
          sudo k3s kubectl set image cronjob/dbt-daily dbt=${{ secrets.DOCKERHUB_USERNAME }}/hasu-dbt:latest -n hasu-ml
          
          # Restart Deployments
          echo "🔄 Restarting Deployments..."
          sudo k3s kubectl rollout restart deployment/airflow-webserver -n hasu-ml || true
          sudo k3s kubectl rollout restart deployment/airflow-scheduler -n hasu-ml || true
          sudo k3s kubectl rollout restart deployment/superset -n hasu-ml || true
          sudo k3s kubectl rollout restart deployment/postgres -n hasu-ml || true
          sudo k3s kubectl rollout restart deployment/clickhouse -n hasu-ml || true
          sudo k3s kubectl rollout restart deployment/redis -n hasu-ml || true
          
          # Wait for rollout
          echo "⏳ Waiting for rollouts..."
          sudo k3s kubectl rollout status deployment/airflow-webserver -n hasu-ml --timeout=300s || true
          sudo k3s kubectl rollout status deployment/airflow-scheduler -n hasu-ml --timeout=300s || true
          sudo k3s kubectl rollout status deployment/superset -n hasu-ml --timeout=300s || true
          
          # Verify
          echo ""
          echo "=== Deployment Status ==="
          sudo k3s kubectl get deployments -n hasu-ml
          echo ""
          echo "=== Pod Status ==="
          sudo k3s kubectl get pods -n hasu-ml
          
          # Cleanup
          echo "🧹 Cleaning up old images..."
          docker image prune -f --filter "until=168h" || true
          
          echo ""
          echo "✅ Deployment completed!"

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Successfully deployed to K3s!"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
