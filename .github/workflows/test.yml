name: Test and Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test-python:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pytest
          pip install -r ml_pipeline/requirements.txt
          pip install -r data_cleaning/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 ml_pipeline/ data_cleaning/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code formatting with black
        run: |
          black --check ml_pipeline/ data_cleaning/ || true

      - name: Check import sorting with isort
        run: |
          isort --check-only ml_pipeline/ data_cleaning/ || true

  test-dbt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install DBT
        run: |
          pip install dbt-core dbt-clickhouse

      - name: Check DBT project
        working-directory: ./dbt_retail
        run: |
          dbt deps
          dbt compile --target clickhouse || true

  dockerfile-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./docker/ml_pipeline/Dockerfile
          ignore: DL3013,DL3008

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./docker/dbt_retail/Dockerfile
          ignore: DL3013,DL3008

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./docker/data_cleaning/Dockerfile
          ignore: DL3013,DL3008
