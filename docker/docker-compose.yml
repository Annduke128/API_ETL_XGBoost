services:
  # ============================================
  # Redis - Buffer & Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: retail_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - retail_network

  # ============================================
  # PostgreSQL - OLTP Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: retail_postgres
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      POSTGRES_DB: retail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retail_network

  # ============================================
  # ClickHouse - Data Warehouse
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: retail_clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DB: retail_dw
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../init/clickhouse:/docker-entrypoint-initdb.d:ro
      - ../init/clickhouse/custom_config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    cap_add:
      - SYS_NICE
      - NET_ADMIN
    privileged: true
    sysctls:
      - net.ipv4.ip_local_port_range=55000 65535
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - retail_network

  # ============================================
  # DBT - Data Transformation (ClickHouse)
  # ============================================
  dbt:
    build:
      context: ./dbt_retail
      dockerfile: Dockerfile
    image: retail-dbt:latest
    container_name: retail_dbt
    environment:
      DBT_PROFILES_DIR: /root/.dbt
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      POSTGRES_DB: retail_db
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DB: retail_dw
    volumes:
      - ../dbt_retail:/usr/app/dbt
      - ../dbt_retail/profiles.yml:/root/.dbt/profiles.yml:ro
    working_dir: /usr/app/dbt
    command: ["run", "--profiles-dir", "/root/.dbt", "--target", "clickhouse"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - retail_network
    profiles:
      - donotstart  # Không tự động start, chỉ chạy khi gọi explicitly

  # ============================================
  # Airflow - Scheduler
  # ============================================
  airflow-postgres:
    image: postgres:15-alpine
    container_name: retail_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - retail_network

  airflow-init:
    image: apache/airflow:2.8.0
    container_name: retail_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    entrypoint: ["/bin/bash", "-c", "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"]
    depends_on:
      - airflow-postgres
    networks:
      - retail_network

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: retail_airflow_webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8085:8080"
    command: webserver
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - retail_network

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: retail_airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      - airflow-init
    networks:
      - retail_network

  # ============================================
  # Superset - BI Dashboard
  # ============================================
  superset-db:
    image: postgres:15-alpine
    container_name: retail_superset_db
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - retail_network

  superset-cache:
    image: redis:7-alpine
    container_name: retail_superset_cache
    networks:
      - retail_network

  superset-init:
    image: apache/superset:2.1.0
    container_name: retail_superset_init
    environment:
      SUPERSET_SECRET_KEY: 'thisisasecretkeyforretailsuperset123'
      DATABASE_DB: superset
      DATABASE_HOST: superset-db
      DATABASE_PASSWORD: superset
      DATABASE_USER: superset
      DATABASE_PORT: 5432
      DATABASE_DIALECT: postgresql
      REDIS_HOST: superset-cache
      REDIS_PORT: 6379
    volumes:
      - ../superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    entrypoint: ["/bin/bash", "-c", "superset db upgrade && superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin || true && superset init"]
    depends_on:
      - superset-db
    networks:
      - retail_network

  superset-web:
    image: apache/superset:2.1.0
    container_name: retail_superset
    environment:
      SUPERSET_SECRET_KEY: 'thisisasecretkeyforretailsuperset123'
      DATABASE_DB: superset
      DATABASE_HOST: superset-db
      DATABASE_PASSWORD: superset
      DATABASE_USER: superset
      DATABASE_PORT: 5432
      DATABASE_DIALECT: postgresql
      REDIS_HOST: superset-cache
      REDIS_PORT: 6379
    ports:
      - "8088:8088"
    volumes:
      - ../superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ../superset/docker-bootstrap.sh:/app/docker-bootstrap.sh:ro
      - superset_data:/app/superset_home
    command: ["/bin/bash", "/app/docker-bootstrap.sh"]
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      - superset-init
      - clickhouse
    networks:
      - retail_network

  # ClickHouse connection setup
  superset-clickhouse-init:
    image: apache/superset:2.1.0
    container_name: retail_superset_ch_init
    environment:
      SUPERSET_SECRET_KEY: 'thisisasecretkeyforretailsuperset123'
      DATABASE_DB: superset
      DATABASE_HOST: superset-db
      DATABASE_PASSWORD: superset
      DATABASE_USER: superset
      DATABASE_PORT: 5432
      DATABASE_DIALECT: postgresql
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
      CLICKHOUSE_DB: retail_dw
    volumes:
      - ../superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ../superset/create_clickhouse_conn.py:/app/create_clickhouse_conn.py:ro
      - superset_data:/app/superset_home
    entrypoint: ["/bin/bash", "-c", "pip install clickhouse-connect==0.7.19 -q && python /app/create_clickhouse_conn.py"]
    depends_on:
      - superset-web
      - clickhouse
    networks:
      - retail_network
    profiles:
      - init

  # ============================================
  # ML Pipeline Service
  # ============================================
  ml-pipeline:
    build:
      context: ./ml_pipeline
      dockerfile: Dockerfile
    image: retail-ml-pipeline:latest
    container_name: retail_ml_pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: retail_db
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse_password
      REDIS_HOST: redis
      # Email Configuration - Lấy từ .env file
      EMAIL_SENDER: ${EMAIL_SENDER:-ml-pipeline@company.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      # Development mode (set DEBUG=true in .env for development)
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ../ml_pipeline:/app
      - ml_models:/app/models
    depends_on:
      - postgres
      - clickhouse
      - redis
    networks:
      - retail_network
    profiles:
      - ml

  # ============================================
  # Sync Tool - Batch Sync PostgreSQL to ClickHouse
  # ============================================
  sync-tool:
    build:
      context: ../data_cleaning
      dockerfile: Dockerfile
    image: retail-sync-tool:latest
    container_name: retail_sync_tool
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      CLICKHOUSE_HOST: clickhouse
      POSTGRES_DB: retail_db
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      CLICKHOUSE_DB: retail_dw
    volumes:
      - ../csv_input:/csv_input
      - ../csv_output:/csv_output
    depends_on:
      - redis
      - postgres
      - clickhouse
    networks:
      - retail_network
    profiles:
      - sync
    # No default command - must specify script to run

  # ============================================
  # Smart Processor - Auto-detect and process files by naming convention
  # ============================================
  smart-processor:
    build:
      context: ../data_cleaning
      dockerfile: Dockerfile
    image: retail-sync-tool:latest
    container_name: retail_smart_processor
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      CLICKHOUSE_HOST: clickhouse
      POSTGRES_DB: retail_db
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      CLICKHOUSE_DB: retail_dw
    volumes:
      - ../csv_input:/csv_input
      - ../csv_output:/csv_output
      - ../data_cleaning:/app:ro  # Mount code for development
      - ../spark-etl/python_etl:/app/spark_etl:ro  # Mount PySpark scripts
    depends_on:
      - redis
      - postgres
      - clickhouse
    networks:
      - retail_network
    profiles:
      - smart
    # Command được chỉ định khi chạy


  # ============================================
  # PySpark ETL Runner (Standalone - No cluster needed)
  # ============================================
  spark-etl:
    build:
      context: ../spark-etl
      dockerfile: Dockerfile
    image: retail-spark-etl:latest
    container_name: retail_spark_etl
    environment:
      - INPUT_PATH=/csv_input
      - OUTPUT_PATH=/shared/processed
      - MODE=full
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=retail_db
      - POSTGRES_USER=retail_user
      - POSTGRES_PASSWORD=retail_password
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_DB=retail_dw
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse_password
    volumes:
      - spark_shared:/shared
      - ../csv_input:/csv_input:ro
      - ../data_cleaning:/app:ro
      - ../spark-etl/python_etl:/opt/spark/python_etl:ro
      - ../spark-etl/python_udfs:/opt/spark/python_udfs:ro
    working_dir: /opt/spark
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      - postgres
      - clickhouse
    networks:
      - retail_network
    profiles:
      - spark-etl

  # ============================================
  # Inventory Import Tool (Local Testing)
  # ============================================
  inventory-import:
    build:
      context: ../data_cleaning
      dockerfile: Dockerfile
    image: retail-sync-tool:latest
    container_name: retail_inventory_import
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: retail_db
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    volumes:
      - ../csv_input:/csv_input:ro
      - ../data_cleaning:/app:ro
    working_dir: /app
    command: ["python", "import_inventory.py", "/csv_input/BaoCaoXuatNhapTon_KV06032026-102339-079.xlsx"]
    depends_on:
      - postgres
    networks:
      - retail_network
    profiles:
      - inventory

volumes:
  redis_data:
  postgres_data:
  clickhouse_data:
  airflow_db_data:
  airflow_logs:
  superset_db_data:
  superset_data:
  ml_models:
  spark_checkpoint:
  spark_shared:

networks:
  retail_network:
    driver: bridge
